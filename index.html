<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 🎵 Hit-Quiz 🎵 </title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background-color: #0d0221; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0;
            background-image: linear-gradient(180deg, #0d0221 0%, #0f0c29 100%); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animationen */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse-gold { 
            from { transform: scale(1); box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); } 
            to { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.7); } 
        }

        .animate-fade { animation: fadeIn 0.6s ease-out; }
        .animate-slide { animation: slideInUp 0.4s ease-out; }
        .winner-glow { border: 2px solid #ffd700 !important; animation: pulse-gold 1.5s infinite alternate !important; }
        .winner-text { color: #ffd700 !important; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* Fixierter Header (Scoreboard) */
        #sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 2, 33, 0.95);
            backdrop-filter: blur(10px);
            padding: 5px 0 !important; /* Kompakt */
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .card { 
            background: rgba(25, 25, 40, 0.8); 
            border-radius: 20px; 
            padding: 20px; 
            margin: 10px auto; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-width: 90%; 
        }

        .hidden { display: none; }
        
        button { 
            background: #ff0055; 
            border: none; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 1em; 
            margin: 5px; 
            font-weight: bold; 
            transition: all 0.3s ease; 
        }

        .btn-secondary { background: #00d4ff; }
        .btn-danger { background: #cc0000; font-size: 0.8em; opacity: 0.7; }
        
        select, input { 
            padding: 10px; border-radius: 12px; border: 1px solid #333; 
            background: #1a1a2e; color: #00d4ff; width: 80%; margin-bottom: 10px; 
        }
        
        /* Neuer Player-Style für iOS Kompatibilität */
        #video-container {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;   /* Winzig klein */
            height: 40px;
            z-index: 9999;
            opacity: 0.05; /* Fast unsichtbar, aber für Safari noch "da" */
            pointer-events: none; /* Man kann nicht versehentlich draufklicken */
            overflow: hidden;
            border-radius: 50%;
        }

        #video-player {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Scoreboard Layout */
        .scoreboard { display: flex; flex-wrap: nowrap; overflow-x: auto; justify-content: center; gap: 10px; padding: 5px; }

        .player-score { 
            background: rgba(20, 20, 35, 0.9); 
            padding: 8px !important; 
            border-radius: 12px; 
            min-width: 130px !important; 
            border: 1px solid #444;
            transition: all 0.5s;
        }

        .player-score button {
            padding: 4px 8px !important;
            margin: 2px !important;
            font-size: 0.7em !important;
            border-radius: 8px !important;
            background: #444;
        }

        .score-val { font-size: 1.6em !important; display: block; margin: 2px 0; color: #bcff00; font-family: monospace; }
        
        .timeline { 
            display: flex; flex-direction: column; gap: 4px; margin-top: 5px; 
            height: 75px !important; overflow-y: auto; font-size: 0.7em;
            padding-right: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;
        }
        
        .timeline-card { background: #161625; padding: 4px; border-radius: 4px; border-left: 3px solid #ff0055; text-align: left; }

        .song-display { color: #bcff00; font-size: 1.2em; margin-top: 10px; font-weight: bold; }

        .timeline::-webkit-scrollbar { width: 3px; }
        .timeline::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }

        @media screen and (min-width: 900px) { .scoreboard { flex-wrap: wrap; } }
    </style>
</head>
<body>

    <div id="setup-area" class="card animate-fade">
        <h2>🎮 Quiz-Setup 🎮</h2>
        <button onclick="toggleFullscreen()" id="fs-btn" class="btn-secondary">📺 Vollbild aktivieren</button>
        <hr style="opacity: 0.1; margin: 15px 0;">
        <p>1. Musik-Kategorie:</p>
        <select id="category-dropdown" onchange="updateBoxDropdown()"></select>
        <p>2. Paket:</p>
        <select id="box-dropdown"></select>
        <hr style="opacity: 0.1; margin: 15px 0;">
        <p>3. Spieler:</p>
        <button onclick="createPlayerInputs(2)">2</button>
        <button onclick="createPlayerInputs(3)">3</button>
        <button onclick="createPlayerInputs(4)">4</button>
        <button onclick="createPlayerInputs(5)">5</button>
        <div id="name-inputs"></div>
        <button id="start-game-btn" class="hidden" onclick="startGame()" style="background: white; color: black;">Spiel starten 🚀</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="sticky-header">
            <div id="scoreboard" class="scoreboard"></div>
        </div>

        <div class="card animate-slide">
            <h2 id="status">Bereit?</h2>
            <button id="random-btn" onclick="pickRandomSong()" style="font-size: 1.1em; background: #1DB954;">🎲 Nächster Song</button>
            <br>
            <button id="undo-btn" onclick="undoLastSong()" class="hidden" style="font-size: 0.8em; background: #555; margin-top: 5px;">↩️ Ups, einen Song zurück</button>
            <div id="video-container">
                <iframe id="video-player" src="" allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div id="controls" class="hidden animate-fade">
                <button onclick="startVideo()" style="background: white; color: black;">▶️ Play</button>
                <button onclick="stopVideo()" style="background: #cc0000;">⏹️ Stopp</button>
                <br>
                <button onclick="revealInfo()" class="btn-secondary" style="margin-top: 10px;">👁️ Lösung zeigen</button>
            </div>

            <div id="song-info" class="hidden animate-slide">
                <div class="song-display">
                    <span id="display-title"></span><br>
                    <span id="display-year" style="font-size: 0.8em; opacity: 0.8;"></span>
                </div>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <p id="current-box-info" style="font-size: 0.8em; color: #00d4ff; margin-bottom: 2px;">Paket: -</p>
            <p id="db-count" style="font-size: 0.75em; color: #888;">Lieder im Pool: 0</p>
            <button onclick="resetScores()" style="background: #ffa500; color: black; font-size: 0.7em;">🔄 Punkte Reset</button>
            <button onclick="resetGame()" class="btn-danger">❌ Alles löschen & Menü</button>
            <button onclick="toggleFullscreen()" class="btn-secondary" style="font-size: 0.7em; padding: 5px 10px;">📺 Vollbild</button>
        </div>
    </div>

<script>
    const quizDaten = {
        "Vinyl-Singles": {
            "Box 1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJkS7ZgyqTEyjfOdiQ0wFlhllm_ZeQHQo9S5z597Jq7ejqKjVjZRTIg9FHoaEx-rGGhsOCAEg5PL1G/pub?output=csv",
            "Box 2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzYclEUZUBUMy_NurHcMxlTxKKrmAXrJvSgjXuWw8K-IJIvKujFNNhWLTOXgPCUGCZQshmA-7m1bf1/pub?output=csv",
            "Box 3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0gsqAIvj8J9NuQXKPmcwhRa4sNz-i-Uts1e-aGa8nS_eKWOAyrBFrgp68KHuc1pCl2j5LPBTNQFg7/pub?output=csv",
            "Box 4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwwFxrPET10PDMDMNSDGxzb1AnrYCJl51OFpZPn9nM8S8z2Vxv10XTYLd5m4Yno_8ahRBNTLK2Z5Ga/pub?output=csv",
            "Box 5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9cOQXUt5d9uTPija5-R66ZO342W8DlXXLdGKYvlZni4ROoYF2WRlTUECeeO0NdTOAgH1yCryyA1TI/pub?output=csv",
            "Box 6": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4s3amgq4KaLoVNjVdNhG4A8mUZG4wL3X_3QOAvVZyCVANVG4xazxGbHSEa7bUaRONcqQ97fXr32V/pub?output=csv",
            "Box 7": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFJKjMwCXk5U6ifDInvMYAvIAwY1zkgyLcGi32iwwokaaRGj1VbfV5olGsIT4_8x8Nw0NTt-eiJ4FB/pub?output=csv",
            "Box 8": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSL_cHFCBj95FNpJsyoX_MPDy8VxIJzsw2jFvex4NqG73TmmZV5GspYUma1W9aowmnvCcGBJRRRYVCL/pub?output=csv"
        },
        "80er Spezial": { "Best of 80s": "DEIN_LINK_HIER" },
        "Mixe": { "Party 1": "DEIN_LINK_HIER" }
    };

    let songDatenbank = [];
    let players = [];
    let currentSong = null;
    let lastSong = null;
    let playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];

    window.onload = function() {
        const catDropdown = document.getElementById('category-dropdown');
        for (let kat in quizDaten) {
            let opt = document.createElement('option');
            opt.value = kat; opt.innerHTML = kat; catDropdown.appendChild(opt);
        }
        updateBoxDropdown();

        const saved = localStorage.getItem('hitster_db_players');
        if (saved) {
            players = JSON.parse(saved);
            const lastUrl = localStorage.getItem('hitster_last_url');
            if(lastUrl) loadSongsFromUrl(lastUrl).then(() => showGame());
        }
    };

    function updateBoxDropdown() {
        const kat = document.getElementById('category-dropdown').value;
        const boxDropdown = document.getElementById('box-dropdown');
        boxDropdown.innerHTML = "";
        for (let box in quizDaten[kat]) {
            let opt = document.createElement('option');
            opt.value = quizDaten[kat][box]; opt.innerHTML = box; boxDropdown.appendChild(opt);
        }
    }

    async function loadSongsFromUrl(url) {
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const geladeneSongs = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const columns = rows[i].includes(';') ? rows[i].split(';') : rows[i].split(',');
                geladeneSongs.push({ ytId: columns[0]?.trim(), titel: columns[1]?.trim(), interpret: columns[2]?.trim(), jahr: columns[3]?.trim() });
            }
            songDatenbank = geladeneSongs.filter(s => s.ytId && s.ytId.length > 5);
            updateDbCounter();
            localStorage.setItem('hitster_last_url', url);
            // Den Namen des Pakets aus dem Dropdown auslesen und anzeigen
            const boxName = document.getElementById('box-dropdown').options[document.getElementById('box-dropdown').selectedIndex].text;
            document.getElementById('current-box-info').innerText = "Paket: " + boxName;
            return true;
        } catch (e) { alert("Fehler beim Laden!"); return false; }
    }

    function createPlayerInputs(num) {
        const container = document.getElementById('name-inputs');
        container.innerHTML = "<h3>Namen:</h3>";
        for(let i=1; i<=num; i++) { container.innerHTML += `<input type="text" id="name-${i}" placeholder="Spieler ${i}">`; }
        document.getElementById('start-game-btn').classList.remove('hidden');
    }

    async function startGame() {
        const url = document.getElementById('box-dropdown').value;
        if(await loadSongsFromUrl(url)) {
            const inputs = document.querySelectorAll('#name-inputs input');
            players = Array.from(inputs).map(inp => ({ name: inp.value || "Spieler", score: 0, timeline: [], wins: 0 }));
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            showGame();
        }
    }

    function showGame() {
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderScoreboard();
    }

    async function pickRandomSong() {
        // 1. Undo-Logik: Den aktuellen Song als "letzten Song" merken
        if (currentSong) {
            lastSong = currentSong; 
            const undoBtn = document.getElementById('undo-btn');
            if (undoBtn) undoBtn.classList.remove('hidden');
        }

        // 2. Den Pool der noch nicht gespielten Songs laden
        playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];
        let pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
    
        // 3. PRÜFUNG: Ist der Pool leer?
        if (pool.length === 0) {
            const autoNext = confirm("Diese Box ist leer! Möchtest du das nächste Paket in dieser Kategorie laden, um weiterzuspielen?");
        
            if (autoNext) {
                // Wir warten, bis die nächste Box geladen wurde
                const success = await loadNextBox(); 
            
                if (success) {
                    // Den Pool mit den neu geladenen Songs aktualisieren
                    pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
                    alert("Nächstes Paket erfolgreich hinzugefügt!");
                } else {
                    alert("Keine weiteren Pakete in dieser Kategorie gefunden. Das Spiel ist zu Ende!");
                    return; // Beendet die Funktion, wenn nichts mehr da ist
                }
            } else {
                return; // Beendet die Funktion, wenn der Nutzer nicht wechseln will
            }
        }

        // 4. Zufälligen Song aus dem (evtl. neuen) Pool auswählen
        currentSong = pool[Math.floor(Math.random() * pool.length)];
    
        // 5. Song im UI anzeigen
        displaySong(currentSong);
    }

    async function loadNextBox() {
        const currentKat = document.getElementById('category-dropdown').value;
        const currentUrl = localStorage.getItem('hitster_last_url');
        const boxen = Object.values(quizDaten[currentKat]);
        const namen = Object.keys(quizDaten[currentKat]);
    
        // Finde den Index der aktuellen Box
        const currentIndex = boxen.indexOf(currentUrl);
    
        if (currentIndex !== -1 && currentIndex < boxen.length - 1) {
            const nextUrl = boxen[currentIndex + 1];
            const nextName = namen[currentIndex + 1];
        
            console.log("Lade nächste Box: " + nextName);
        
            // Songs der neuen Box zur bestehenden Datenbank HINZUFÜGEN (nicht ersetzen)
            return await appendSongsFromUrl(nextUrl);
        }
        return false;
    }

    async function appendSongsFromUrl(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Netzwerk-Fehler");
        
            const data = await response.text();
            const rows = data.split(/\r?\n/);
        
            // 1. Namen der neuen Box für die Anzeige finden
            const currentKat = document.getElementById('category-dropdown').value;
            const boxenInKat = quizDaten[currentKat];
            const nextBoxName = Object.keys(boxenInKat).find(key => boxenInKat[key] === url);
        
            if (nextBoxName) {
                document.getElementById('current-box-info').innerText = "Paket: " + nextBoxName;
            }

            // 2. Lieder parsen und zur songDatenbank HINZUFÜGEN
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
            
                // Trenner finden (Semikolon oder Komma)
                const delimiter = rows[i].includes(';') ? ';' : ',';
                // Spalten trennen und Anführungszeichen entfernen
                const columns = rows[i].split(delimiter).map(col => col.replace(/^"|"$/g, '').trim());

                if (columns.length >= 4) {
                    songDatenbank.push({ 
                        ytId: columns[0], 
                        titel: columns[1], 
                        interpret: columns[2], 
                        jahr: columns[3] 
                    });
                }
            }

            // 3. Counter und Speicher aktualisieren
            updateDbCounter();
            localStorage.setItem('hitster_last_url', url);
        
            console.log("Neues Paket erfolgreich angehängt: " + nextBoxName);
            return true;
        } catch (e) {
            console.error("Fehler beim Anhängen der Box:", e);
            return false;
        }
    }

    // DIESE FUNKTION FEHLTE DIR:
    function displaySong(song) {
        document.getElementById('status').innerText = "Song geladen!";
        document.getElementById('display-title').innerText = song.titel + " - " + song.interpret;
        document.getElementById('display-year').innerText = "Jahr: " + song.jahr;
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('song-info').classList.add('hidden');
        document.getElementById('video-player').src = "";
    }
        
    function startVideo() { 
        if(currentSong) {
            // Wichtig: mute=0 (mit Ton) aber autoplay=1
            // playsinline=1 ist der heilige Gral für iPhones
            const videoUrl = `https://www.youtube.com/embed/${currentSong.ytId}?autoplay=1&playsinline=1&enablejsapi=1&mute=0&origin=${window.location.origin}`;
        
            const player = document.getElementById('video-player');
            player.src = videoUrl; 
        
            // Kleiner Trick: Wir setzen die Opacity kurz hoch, falls Safari prüft
            document.getElementById('video-container').style.opacity = "0.1";
        
            document.getElementById('status').innerText = "🎵 Musik läuft...";
        } 
    }

    function stopVideo() { 
        document.getElementById('video-player').src = ""; 
        document.getElementById('video-container').style.opacity = "0.05";
        document.getElementById('status').innerText = "Musik gestoppt";
    }
    
    function revealInfo() {
        stopVideo();
        document.getElementById('song-info').classList.remove('hidden');
        if (currentSong && !playedSongIds.includes(currentSong.ytId)) {
            playedSongIds.push(currentSong.ytId);
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        }
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = "";
        players.forEach((p, i) => {
            const isWinner = p.score >= 10;
            const sorted = [...p.timeline].sort((a, b) => parseInt(a.jahr) - parseInt(b.jahr));
            const timelineHTML = sorted.map(s => `<div class="timeline-card"><b>${s.jahr}</b> ${s.titel}</div>`).join("");
            sb.innerHTML += `
                <div class="player-score ${isWinner ? 'winner-glow' : ''}">
                    <small>🏆 ${p.wins || 0}</small><br>
                    <strong class="${isWinner ? 'winner-text' : ''}">${p.name}</strong>
                    <span class="score-val ${isWinner ? 'winner-text' : ''}">${p.score}</span>
                    <button onclick="addPoint(${i})">+1</button>
                    <button onclick="updateScore(${i}, -1)">-1</button>
                    <div class="timeline">${timelineHTML}</div>
                </div>`;
        });
    }

    function addPoint(idx) {
        if (!currentSong) return;
        players[idx].timeline.push({ titel: currentSong.titel, jahr: currentSong.jahr });
        players[idx].score = players[idx].timeline.length;
        renderScoreboard();

        if (players[idx].score >= 10) {
            players[idx].wins = (players[idx].wins || 0) + 1;
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            
            setTimeout(() => { 
                if(confirm("🏆 " + players[idx].name + " GEWINNT!\n\nNeue Runde mit diesen Spielern starten? (Gespielte Lieder bleiben gesperrt)")) {
                    players.forEach(p => { p.score = 0; p.timeline = []; });
                    localStorage.setItem('hitster_db_players', JSON.stringify(players));
                    renderScoreboard();
                }
            }, 600);
        } else {
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
        }
    }

    function updateScore(i, v) {
        if (v < 0 && players[i].timeline.length > 0) {
            // Den letzten Song aus der Timeline des Spielers holen
            const removedSong = players[i].timeline.pop();
        
            // Optional: Den Song wieder für den Pool freigeben
            // Wenn du willst, dass der Song gelöscht bleibt, lass die nächste Zeile weg:
            playedSongIds = playedSongIds.filter(s => s.titel !== removedSong.titel);
        
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
        }
    
        // Score aktualisieren
        players[i].score = players[i].timeline.length;
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        renderScoreboard();
        updateDbCounter();
    }
    
    function updateDbCounter() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        document.getElementById('db-count').innerText = `Pool: ${pool.length}`;
    }

    function toggleFullscreen() {
        let elem = document.documentElement;
        if (!document.fullscreenElement) {
            elem.requestFullscreen().then(() => {
                // Text auf beiden möglichen Buttons aktualisieren
                if(document.getElementById('fs-btn')) document.getElementById('fs-btn').innerText = "📺 Beenden";
                if(document.getElementById('fs-btn-game')) document.getElementById('fs-btn-game').innerText = "📺 Beenden";
            }).catch(e => console.log(e));
        } else {
            document.exitFullscreen();
            if(document.getElementById('fs-btn')) document.getElementById('fs-btn').innerText = "📺 Vollbild";
            if(document.getElementById('fs-btn-game')) document.getElementById('fs-btn-game').innerText = "📺 Vollbild";
        }
    }

    function undoLastSong() {
        if (lastSong) {
            currentSong = lastSong;
            lastSong = null; // Nur einmaliges Zurückgehen erlauben
            displaySong(currentSong);
            document.getElementById('undo-btn').classList.add('hidden');
        
            // Den Song wieder aus der Sperrliste entfernen, falls er dort schon gelandet ist
            playedSongIds = playedSongIds.filter(id => id !== currentSong.ytId);
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        
            alert("Letzter Song wurde wiederhergestellt!");
        }
    }

    function resetScores() { if(confirm("Punkte dieser Runde löschen?")) { players.forEach(p => {p.score=0; p.timeline=[];}); renderScoreboard(); } }
    function resetGame() { if(confirm("ALLES LÖSCHEN? (Namen, Siege und Sperrliste der Songs)")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
