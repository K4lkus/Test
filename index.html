<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 🎵 Hit-Quiz 🎵 </title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background-color: #0d0221; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0;
            background-image: linear-gradient(180deg, #0d0221 0%, #0f0c29 100%); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card { 
            background: rgba(25, 25, 40, 0.8); 
            border-radius: 20px; 
            padding: 20px; 
            margin: 10px auto; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-width: 90%; 
        }

        /* Der iOS-sichere Schallplatten-Player */
        #video-wrapper {
            width: 120px;
            height: 120px;
            margin: 15px auto;
            border-radius: 50%;
            border: 4px solid #00d4ff;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            background: #000;
            display: none;
        }

        #video-player {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 220px;
            height: 220px;
            pointer-events: none;
        }

        .playing { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
        
        button { 
            background: #ff0055; 
            border: none; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 1em; 
            margin: 5px; 
            font-weight: bold; 
            transition: all 0.3s ease; 
        }

        .btn-secondary { background: #00d4ff; }
        .btn-danger { background: #cc0000; }
        
        #sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13, 2, 33, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .scoreboard { display: flex; overflow-x: auto; justify-content: center; gap: 10px; padding: 10px; }
        .player-score { background: rgba(20, 20, 35, 0.9); padding: 10px; border-radius: 12px; min-width: 120px; border: 1px solid #444; }
        .score-val { font-size: 1.5em; color: #bcff00; display: block; }
        .timeline { height: 80px; overflow-y: auto; font-size: 0.7em; margin-top: 5px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="setup-area" class="card">
        <h2>🎮 Quiz-Setup 🎮</h2>
        <p>Kategorie & Paket wählen:</p>
        <select id="category-dropdown" onchange="updateBoxDropdown()"></select>
        <select id="box-dropdown"></select>
        <div id="name-inputs">
            <button onclick="createPlayerInputs(2)">2 Spieler</button>
            <button onclick="createPlayerInputs(3)">3 Spieler</button>
            <button onclick="createPlayerInputs(4)">4 Spieler</button>
        </div>
        <button id="start-game-btn" class="hidden" onclick="startGame()">Spiel starten 🚀</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="sticky-header">
            <div id="scoreboard" class="scoreboard"></div>
        </div>

        <div class="card">
            <h2 id="status">Bereit?</h2>
            
            <div id="video-wrapper">
                <iframe id="video-player" src="" frameborder="0" allow="autoplay; encrypted-media; playsinline"></iframe>
            </div>

            <button onclick="pickRandomSong()" style="background: #1DB954;">🎲 Nächster Song</button>
            
            <div id="controls" class="hidden">
                <button onclick="startVideo()" style="background: white; color: black;">▶️ Play</button>
                <button onclick="stopVideo()" style="background: #cc0000;">⏹️ Stopp</button>
                <br>
                <button onclick="revealInfo()" class="btn-secondary" style="margin-top:10px;">👁️ Lösung</button>
            </div>

            <div id="song-info" class="hidden">
                <h3 id="display-title" style="color: #bcff00;"></h3>
                <p id="display-year"></p>
            </div>
        </div>

        <div id="db-info" style="margin-top: 20px; font-size: 0.8em;">
            <p id="db-count">Lade Pool...</p>
            <button onclick="resetGame()" class="btn-danger" style="font-size: 0.7em;">❌ Reset & Menü</button>
        </div>
    </div>

<script>
    const quizDaten = {
        "Vinyl-Singles": {
            "Box 1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJkS7ZgyqTEyjfOdiQ0wFlhllm_ZeQHQo9S5z597Jq7ejqKjVjZRTIg9FHoaEx-rGGhsOCAEg5PL1G/pub?output=csv",
            "Box 2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzYclEUZUBUMy_NurHcMxlTxKKrmAXrJvSgjXuWw8K-IJIvKujFNNhWLTOXgPCUGCZQshmA-7m1bf1/pub?output=csv"
        }
    };

    let songDatenbank = [];
    let players = [];
    let currentSong = null;
    let playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];

    window.onload = () => {
        const catDrop = document.getElementById('category-dropdown');
        for (let kat in quizDaten) {
            let opt = document.createElement('option');
            opt.value = kat; opt.innerHTML = kat; catDrop.appendChild(opt);
        }
        updateBoxDropdown();
    };

    function updateBoxDropdown() {
        const kat = document.getElementById('category-dropdown').value;
        const boxDrop = document.getElementById('box-dropdown');
        boxDrop.innerHTML = "";
        for (let box in quizDaten[kat]) {
            let opt = document.createElement('option');
            opt.value = quizDaten[kat][box]; opt.innerHTML = box; boxDrop.appendChild(opt);
        }
    }

    async function loadSongs(url) {
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            songDatenbank = rows.map(row => {
                const col = row.split(row.includes(';') ? ';' : ',');
                return { ytId: col[0]?.trim(), titel: col[1]?.trim(), interpret: col[2]?.trim(), jahr: col[3]?.trim() };
            }).filter(s => s.ytId);
            updateDbCounter();
            return true;
        } catch (e) { alert("iPad-Fehler: Liste konnte nicht geladen werden."); return false; }
    }

    function createPlayerInputs(num) {
        const div = document.getElementById('name-inputs');
        div.innerHTML = "";
        for(let i=1; i<=num; i++) div.innerHTML += `<input type="text" id="p${i}" placeholder="Name ${i}" style="margin:5px; padding:10px; border-radius:10px;">`;
        document.getElementById('start-game-btn').classList.remove('hidden');
    }

    async function startGame() {
        const url = document.getElementById('box-dropdown').value;
        if(await loadSongs(url)) {
            const inps = document.querySelectorAll('#name-inputs input');
            players = Array.from(inps).map(id => ({ name: id.value || "Spieler", score: 0, timeline: [] }));
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            renderScoreboard();
        }
    }

    function updateDbCounter() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        document.getElementById('db-count').innerHTML = `Pool: ${pool.length} | Gespielt: ${playedSongIds.length} | Gesamt: ${songDatenbank.length}`;
    }

    function pickRandomSong() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        if(pool.length === 0) return alert("Box leer!");
        currentSong = pool[Math.floor(Math.random() * pool.length)];
        
        document.getElementById('status').innerText = "Song bereit!";
        document.getElementById('video-wrapper').style.display = "block";
        document.getElementById('video-player').src = "";
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('song-info').classList.add('hidden');
        document.getElementById('video-wrapper').classList.remove('playing');
    }

    function startVideo() {
        if(!currentSong) return;
        // iOS-spezifische URL
        const url = `https://www.youtube.com/embed/${currentSong.ytId}?autoplay=1&playsinline=1&mute=0&enablejsapi=1`;
        document.getElementById('video-player').src = url;
        document.getElementById('video-wrapper').classList.add('playing');
        document.getElementById('status').innerText = "🎵 Musik läuft...";
    }

    function stopVideo() {
        document.getElementById('video-player').src = "";
        document.getElementById('video-wrapper').classList.remove('playing');
    }

    function revealInfo() {
        stopVideo();
        document.getElementById('song-info').classList.remove('hidden');
        document.getElementById('display-title').innerText = `${currentSong.titel} - ${currentSong.interpret}`;
        document.getElementById('display-year').innerText = `Jahr: ${currentSong.jahr}`;
        if(!playedSongIds.includes(currentSong.ytId)) {
            playedSongIds.push(currentSong.ytId);
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        }
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = players.map((p, i) => `
            <div class="player-score">
                <strong>${p.name}</strong>
                <span class="score-val">${p.score}</span>
                <button onclick="addPoint(${i})" style="padding:5px 10px; font-size:0.7em;">+1</button>
                <div class="timeline">${p.timeline.map(s => `<div>${s}</div>`).join("")}</div>
            </div>
        `).join("");
    }

    function addPoint(idx) {
        if(!currentSong) return;
        players[idx].timeline.push(`${currentSong.jahr} - ${currentSong.titel}`);
        players[idx].score = players[idx].timeline.length;
        renderScoreboard();
    }

    function resetGame() { if(confirm("Alles löschen?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
