<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 🎵 Hit-Quiz 🎵 </title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background-color: #0d0221; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0;
            background-image: linear-gradient(180deg, #0d0221 0%, #0f0c29 100%); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animationen Definition */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulse-gold { 
            from { transform: scale(1); box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); } 
            to { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); } 
        }

        .animate-fade { animation: fadeIn 0.8s ease-out; }
        .animate-slide { animation: slideInUp 0.5s ease-out; }
        
        .winner-glow { 
            border: 2px solid #ffd700 !important;
            animation: pulse-gold 1.5s infinite alternate !important; 
        }
        .winner-text { color: #ffd700 !important; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* Layout Komponenten */
        #sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 2, 33, 0.95);
            backdrop-filter: blur(10px);
            padding: 5px 0;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .card { 
            background: rgba(25, 25, 40, 0.8); 
            border-radius: 20px; 
            padding: 20px; 
            margin: 15px auto; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-width: 90%; 
        }

        .hidden { display: none; }
        
        button { 
            background: #ff0055; 
            border: none; 
            color: white; 
            padding: 14px 28px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 1em; 
            margin: 8px; 
            font-weight: bold; 
            transition: all 0.3s ease; 
        }

        button:active { transform: scale(0.95); }
        .btn-secondary { background: #00d4ff; }
        .btn-danger { background: #cc0000; font-size: 0.8em; opacity: 0.7; }
        
        select, input { 
            padding: 12px; border-radius: 12px; border: 1px solid #333; 
            background: #1a1a2e; color: #00d4ff; width: 85%; margin-bottom: 15px; 
            font-size: 1.1em;
        }
        
        #video-player { position: absolute; left: -9999px; width: 1px; height: 1px; }

        /* Scoreboard & Timeline */
        .scoreboard { 
            display: flex; flex-wrap: nowrap; overflow-x: auto; 
            justify-content: center; gap: 15px; padding: 10px;
        }

        .player-score { 
            background: rgba(20, 20, 35, 0.9); 
            padding: 10px; border-radius: 12px; 
            min-width: 140px; border: 1px solid #333;
            transition: all 0.5s;
        }

        .score-val { font-size: 1.8em; display: block; margin: 2px 0; color: #bcff00; font-family: monospace; }
        
        .timeline { 
            display: flex; flex-direction: column; gap: 5px; margin-top: 10px; 
            height: 80px; overflow-y: auto; font-size: 0.7em;
            padding-right: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;
        }
        
        .timeline-card { 
            background: #161625; padding: 6px; border-radius: 5px; 
            border-left: 3px solid #ff0055; text-align: left;
            animation: fadeIn 0.4s ease-in;
        }

        .song-display { color: #bcff00; font-size: 1.3em; margin-top: 10px; font-weight: bold; }

        /* Scrollbar Styling */
        .timeline::-webkit-scrollbar { width: 3px; }
        .timeline::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }

        @media screen and (min-width: 900px) {
            .scoreboard { flex-wrap: wrap; }
            .player-score { min-width: 200px; }
        }

        .player-score button {
            padding: 4px 8px !important;
            margin: 2px !important;
            font-size: 0.7em !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body>

    <div id="setup-area" class="card animate-fade">
        <h2>🎮 Quiz-Setup 🎮</h2>
        <button onclick="toggleFullscreen()" id="fs-btn" class="btn-secondary">📺 Vollbild aktivieren</button>
        <hr style="opacity: 0.1; margin: 20px 0;">

        <p>1. Musik-Kategorie wählen:</p>
        <select id="category-dropdown" onchange="updateBoxDropdown()"></select>

        <p>2. Song-Paket wählen:</p>
        <select id="box-dropdown"></select>

        <hr style="opacity: 0.1; margin: 20px 0;">
        <p>3. Spieleranzahl:</p>
        <button onclick="createPlayerInputs(2)">2 Spieler</button>
        <button onclick="createPlayerInputs(3)">3 Spieler</button>
        <button onclick="createPlayerInputs(4)">4 Spieler</button>
        <button onclick="createPlayerInputs(5)">5 Spieler</button>
        
        <div id="name-inputs" class="animate-slide"></div>
        <button id="start-game-btn" class="hidden" onclick="startGame()" style="background: white; color: black;">Spiel starten 🚀</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="sticky-header">
            <div id="scoreboard" class="scoreboard"></div>
        </div>

        <div class="card animate-slide">
            <h2 id="status">Bereit?</h2>
            <button id="random-btn" onclick="pickRandomSong()" style="font-size: 1.2em; background: #1DB954;">🎲 Nächster Song</button>
            
            <iframe id="video-player" src="" frameborder="0" allow="autoplay"></iframe>
            
            <div id="controls" class="hidden animate-fade" style="margin-top: 15px;">
                <button onclick="startVideo()" style="background: #ffffff; color: black;">▶️ Abspielen</button>
                <button onclick="stopVideo()" style="background: #cc0000; color: white;">⏹️ Stopp</button>
                <br>
                <button onclick="revealInfo()" class="btn-secondary" style="margin-top: 10px;">👁️ Lösung zeigen</button>
            </div>

            <div id="song-info" class="hidden animate-slide">
                <div class="song-display">
                    <span id="display-title"></span><br>
                    <span id="display-year" style="font-size: 0.8em; opacity: 0.8;"></span>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; padding-bottom: 40px;">
            <p id="db-count" style="font-size: 0.8em; color: #888;">Lieder im Pool: 0</p>
            <button onclick="resetScores()" style="background: #ffa500; color: black; font-size: 0.8em;">🔄 Runde zurücksetzen</button>
            <button onclick="resetGame()" class="btn-danger">Anderes Spiel wählen</button>
        </div>
    </div>

<script>
    const quizDaten = {
        "Vinyl-Singles": {
            "Box 1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJkS7ZgyqTEyjfOdiQ0wFlhllm_ZeQHQo9S5z597Jq7ejqKjVjZRTIg9FHoaEx-rGGhsOCAEg5PL1G/pub?output=csv",
            "Box 2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzYclEUZUBUMy_NurHcMxlTxKKrmAXrJvSgjXuWw8K-IJIvKujFNNhWLTOXgPCUGCZQshmA-7m1bf1/pub?output=csv",
            "Box 3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0gsqAIvj8J9NuQXKPmcwhRa4sNz-i-Uts1e-aGa8nS_eKWOAyrBFrgp68KHuc1pCl2j5LPBTNQFg7/pub?output=csv",
            "Box 4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwwFxrPET10PDMDMNSDGxzb1AnrYCJl51OFpZPn9nM8S8z2Vxv10XTYLd5m4Yno_8ahRBNTLK2Z5Ga/pub?output=csv",
            "Box 5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9cOQXUt5d9uTPija5-R66ZO342W8DlXXLdGKYvlZni4ROoYF2WRlTUECeeO0NdTOAgH1yCryyA1TI/pub?output=csv",
            "Box 6": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4s3amgq4KaLoVNjVdNhG4A8mUZG4wL3X_3QOAvVZyCVANVG4xazxGbHSEa7bUaRONcqQ97fXr32V/pub?output=csv",
            "Box 7": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFJKjMwCXk5U6ifDInvMYAvIAwY1zkgyLcGi32iwwokaaRGj1VbfV5olGsIT4_8x8Nw0NTt-eiJ4FB/pub?output=csv",
            "Box 8": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSL_cHFCBj95FNpJsyoX_MPDy8VxIJzsw2jFvex4NqG73TmmZV5GspYUma1W9aowmnvCcGBJRRRYVCL/pub?output=csv"
        },
        "80er - 90er Fabi": { "Best of 80s": "DEIN_LINK_HIER" },
        "Meine Mixe": { "Party Mix 1": "DEIN_LINK_HIER" }
    };

    let songDatenbank = [];
    let players = [];
    let currentSong = null;
    let playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];

    window.onload = function() {
        const catDropdown = document.getElementById('category-dropdown');
        for (let kat in quizDaten) {
            let opt = document.createElement('option');
            opt.value = kat; opt.innerHTML = kat; catDropdown.appendChild(opt);
        }
        updateBoxDropdown();

        const saved = localStorage.getItem('hitster_db_players');
        if (saved) {
            players = JSON.parse(saved);
            const lastUrl = localStorage.getItem('hitster_last_url');
            if(lastUrl) loadSongsFromUrl(lastUrl).then(() => showGame());
        }
    };

    function toggleFullscreen() {
        let elem = document.documentElement;
        let btn = document.getElementById('fs-btn');
        if (!document.fullscreenElement) {
            elem.requestFullscreen().then(() => { btn.innerText = "📺 Vollbild beenden"; }).catch(e => console.log(e));
        } else {
            document.exitFullscreen(); btn.innerText = "📺 Vollbild aktivieren";
        }
    }

    function updateBoxDropdown() {
        const kat = document.getElementById('category-dropdown').value;
        const boxDropdown = document.getElementById('box-dropdown');
        boxDropdown.innerHTML = "";
        for (let box in quizDaten[kat]) {
            let opt = document.createElement('option');
            opt.value = quizDaten[kat][box]; opt.innerHTML = box; boxDropdown.appendChild(opt);
        }
    }

    async function loadSongsFromUrl(url) {
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const geladeneSongs = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const columns = rows[i].includes(';') ? rows[i].split(';') : rows[i].split(',');
                geladeneSongs.push({ ytId: columns[0]?.trim(), titel: columns[1]?.trim(), interpret: columns[2]?.trim(), jahr: columns[3]?.trim() });
            }
            songDatenbank = geladeneSongs.filter(s => s.ytId && s.ytId.length > 5);
            updateDbCounter();
            localStorage.setItem('hitster_last_url', url);
            return true;
        } catch (e) { alert("Fehler beim Laden!"); return false; }
    }

    function createPlayerInputs(num) {
        const container = document.getElementById('name-inputs');
        container.innerHTML = "<h3>Namen eingeben:</h3>";
        for(let i=1; i<=num; i++) {
            container.innerHTML += `<input type="text" id="name-${i}" placeholder="Spieler ${i}" class="animate-fade">`;
        }
        document.getElementById('start-game-btn').classList.remove('hidden');
    }

    async function startGame() {
        const url = document.getElementById('box-dropdown').value;
        if(await loadSongsFromUrl(url)) {
            const inputs = document.querySelectorAll('#name-inputs input');
            players = Array.from(inputs).map(inp => ({ name: inp.value || "Spieler", score: 0, timeline: [], wins: 0 }));
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            showGame();
        }
    }

    function showGame() {
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderScoreboard();
    }

    function pickRandomSong() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        if (pool.length === 0) return alert("Paket leer!");
        currentSong = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('status').innerText = "Song geladen!";
        document.getElementById('display-title').innerText = currentSong.titel + " - " + currentSong.interpret;
        document.getElementById('display-year').innerText = "Jahr: " + currentSong.jahr;
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('song-info').classList.add('hidden');
        document.getElementById('video-player').src = "";
    }

    function startVideo() { if(currentSong) document.getElementById('video-player').src = `https://www.youtube.com/embed/${currentSong.ytId}?autoplay=1`; }
    function stopVideo() { document.getElementById('video-player').src = ""; }

    function revealInfo() {
        stopVideo();
        document.getElementById('song-info').classList.remove('hidden');
        if (currentSong && !playedSongIds.includes(currentSong.ytId)) {
            playedSongIds.push(currentSong.ytId);
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        }
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = "";
        players.forEach((p, i) => {
            const isWinner = p.score >= 10;
            const sorted = [...p.timeline].sort((a, b) => parseInt(a.jahr) - parseInt(b.jahr));
            const timelineHTML = sorted.map(s => `<div class="timeline-card"><b>${s.jahr}</b> ${s.titel}</div>`).join("");
            sb.innerHTML += `
                <div class="player-score ${isWinner ? 'winner-glow' : ''}">
                    <small>🏆 ${p.wins || 0}</small><br>
                    <strong class="${isWinner ? 'winner-text' : ''}">${p.name}</strong>
                    <span class="score-val ${isWinner ? 'winner-text' : ''}">${p.score}</span>
                    <button onclick="addPoint(${i})" style="padding: 5px 10px;">+1</button>
                    <button onclick="updateScore(${i}, -1)" style="background:#555; padding: 5px 10px;">-1</button>
                    <div class="timeline">${timelineHTML}</div>
                </div>`;
        });
    }

    function addPoint(idx) {
        if (!currentSong) return;
        players[idx].timeline.push({ titel: currentSong.titel, jahr: currentSong.jahr });
        players[idx].score = players[idx].timeline.length;
        if (players[idx].score >= 10) {
            players[idx].wins = (players[idx].wins || 0) + 1;
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => { alert("🥇 " + players[idx].name + " hat die Runde gewonnen!"); }, 500);
        }
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        renderScoreboard();
    }

    function updateScore(i, v) {
        if (v < 0 && players[i].timeline.length > 0) players[i].timeline.pop();
        players[i].score = players[i].timeline.length;
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        renderScoreboard();
    }

    function updateDbCounter() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        document.getElementById('db-count').innerText = `Pool: ${pool.length}`;
    }

    function resetScores() { if(confirm("Runde zurücksetzen?")) { players.forEach(p => {p.score=0; p.timeline=[];}); renderScoreboard(); } }
    function resetGame() { if(confirm("Zurück zum Menü?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
