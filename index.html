<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 🎵 Hit-Quiz 🎵 </title>

    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hit-Quiz">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0221">
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background-color: #0d0221; color: #e0e0e0; padding: 20px; background-image: linear-gradient(180deg, #0d0221 0%, #0f0c29 100%); min-height: 100vh; }
        .card { background: rgba(25, 25, 40, 0.8); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); max-width: 90%; margin-left: auto; margin-right: auto; backdrop-filter: blur(4px); }
        .hidden { display: none; }
        
        button { background: #ff0055; border: none; color: white; padding: 14px 28px; border-radius: 50px; cursor: pointer; font-size: 1em; margin: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }
        button:hover { transform: scale(1.08) translateY(-3px); background: #ff2e77; box-shadow: 0 0 20px rgba(255, 0, 85, 0.8); }
        .btn-secondary { background: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .btn-secondary:hover { background: #33e0ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); }
        .btn-danger { background: #cc0000; font-size: 0.8em; opacity: 0.7; }
        
        select, input { padding: 12px; border-radius: 12px; border: 1px solid #333; background: #1a1a2e; color: #00d4ff; width: 85%; margin-bottom: 15px; font-size: 1em; outline: none; }
        
        #video-player { position: absolute; left: -9999px; width: 1px; height: 1px; }
        .scoreboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .player-score { background: rgba(20, 20, 35, 0.9); padding: 20px; border-radius: 15px; min-width: 240px; border: 1px solid #333; text-align: center; }
        .score-val { font-size: 3em; display: block; margin: 10px 0; color: #bcff00; text-shadow: 0 0 15px rgba(188, 255, 0, 0.6); font-family: 'Courier New', Courier, monospace; }
        
        .timeline { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .timeline-card { background: #161625; padding: 12px; border-radius: 10px; border-left: 5px solid #ff0055; text-align: left; font-size: 0.9em; animation: fadeIn 0.4s ease-out; }
        .timeline-year { font-weight: bold; color: #00d4ff; margin-right: 10px; font-size: 1.1em; }

        /* Google Cast Button Styling - KORRIGIERT */
        google-cast-launcher { 
            display: inline-block; 
            width: 45px; 
            height: 45px; 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 5px; 
            cursor: pointer; 
            vertical-align: middle; 
            border: 1px solid rgba(0, 212, 255, 0.3); 
            --connected-color: #bcff00; 
            --disconnected-color: #ffffff; 
        }

        .winner-glow { color: #ffd700 !important; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); animation: pulse-gold 1.5s infinite alternate; }
        .total-wins { display: block; font-size: 0.8em; color: #ffd700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes pulse-gold { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .song-display { color: #bcff00; font-size: 1.4em; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="setup-area" class="card">
        <h2>👥 Hit-Quiz Setup 👥</h2>
        <button onclick="toggleFullscreen()" class="btn-secondary">📺 Vollbild aktivieren</button>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <p>1. Wähle ein Song-Paket:</p>
        <select id="playlist-dropdown">
            <option value="set1">Box 1</option>
            <option value="set2">Box 2</option>
            <option value="set3">Box 3</option>
            <option value="set4">Box 4</option>
            <option value="set5">Box 5</option>
            <option value="set6">Box 6</option>
            <option value="set7">Box 7</option>
            <option value="set8">Box 8</option>
        </select>

        <p>2. Wie viele Personen spielen?</p>
        <button onclick="createPlayerInputs(2)">2 Spieler</button>
        <button onclick="createPlayerInputs(3)">3 Spieler</button>
        <button onclick="createPlayerInputs(4)">4 Spieler</button>
        <button onclick="createPlayerInputs(5)">5 Spieler</button>
        
        <div id="name-inputs" style="margin-top: 20px;"></div>
        <button id="start-game-btn" class="hidden" onclick="startGame()" style="background: white; color: black;">Spiel starten 🚀</button>
    </div>

    <div id="game-area" class="hidden">
        <div class="card">
            <h2 id="status">Bereit?</h2>
            <button id="random-btn" onclick="pickRandomSong()" style="font-size: 1.2em; background: #1DB954;">🎲 Nächster Song</button>
            
            <iframe id="video-player" src="" frameborder="0" allow="autoplay"></iframe>
            
            <div id="controls" class="hidden" style="margin-top: 15px;">
                <button id="play-btn" onclick="startVideo()" style="background: #ffffff; color: black;">▶️ Abspielen</button>
                <button id="stop-btn" onclick="stopVideo()" style="background: #cc0000; color: white;">⏹️ Stopp</button>
                <google-cast-launcher id="cast-button"></google-cast-launcher>
                <br>
                <button id="reveal-btn" onclick="revealInfo()" class="btn-secondary" style="margin-top: 10px;">👁️ Lösung zeigen</button>
            </div>

            <div id="song-info" class="hidden">
                <div class="song-display">
                    <strong id="display-title"></strong><br>
                    <span id="display-year"></span>
                </div>
            </div>
        </div>

        <div id="scoreboard" class="scoreboard"></div>
        
        <div style="margin-top: 40px; padding-bottom: 40px;">
            <p id="db-count" style="font-size: 0.8em; color: #888;">Songs geladen: 0</p>
            <button onclick="resetOnlyWins()" style="background: #ffa500; color: black; font-size: 0.8em;">🏆 Siege zurücksetzen</button>
            <button onclick="resetGame()" class="btn-danger">Kompletter Reset</button>
        </div>
    </div>

<script>
    // ==========================================
    // 1. INITIALISIERUNG (GOOGLE CAST & VOLLBILD)
    // ==========================================

    window['__onGCastApiAvailable'] = function(isAvailable) {
        if (isAvailable) {
            // Initialisiert den Cast-Kontext sofort
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
            console.log("Cast API bereit und initialisiert!");
        }
    };

    function toggleFullscreen() {
        let elem = document.documentElement;
        if (!document.fullscreenElement) {
            elem.requestFullscreen().catch(err => {
                console.log("Vollbild nicht möglich: " + err.message);
            });
        } else {
            document.exitFullscreen();
        }
    }

    // ==========================================
    // 2. SPIEL-LOGIK
    // ==========================================

    const playlists = {
        set1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJkS7ZgyqTEyjfOdiQ0wFlhllm_ZeQHQo9S5z597Jq7ejqKjVjZRTIg9FHoaEx-rGGhsOCAEg5PL1G/pub?output=csv",
        set2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzYclEUZUBUMy_NurHcMxlTxKKrmAXrJvSgjXuWw8K-IJIvKujFNNhWLTOXgPCUGCZQshmA-7m1bf1/pub?output=csv",
        set3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0gsqAIvj8J9NuQXKPmcwhRa4sNz-i-Uts1e-aGa8nS_eKWOAyrBFrgp68KHuc1pCl2j5LPBTNQFg7/pub?output=csv",
        set4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwwFxrPET10PDMDMNSDGxzb1AnrYCJl51OFpZPn9nM8S8z2Vxv10XTYLd5m4Yno_8ahRBNTLK2Z5Ga/pub?output=csv",
        set5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9cOQXUt5d9uTPija5-R66ZO342W8DlXXLdGKYvlZni4ROoYF2WRlTUECeeO0NdTOAgH1yCryyA1TI/pub?output=csv",
        set6: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTO4s3amgq4KaLoVNjVdNhG4A8mUZG4wL3X_3QOAvVZyCVANVG4xazxGbHSEa7bUaRONcqQ97fXr32V/pub?output=csv",
        set7: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFJKjMwCXk5U6ifDInvMYAvIAwY1zkgyLcGi32iwwokaaRGj1VbfV5olGsIT4_8x8Nw0NTt-eiJ4FB/pub?output=csv",    
        set8: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSL_cHFCBj95FNpJsyoX_MPDy8VxIJzsw2jFvex4NqG73TmmZV5GspYUma1W9aowmnvCcGBJRRRYVCL/pub?output=csv"
    };

    let songDatenbank = [];
    let players = [];
    let currentSong = null;
    let playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];

    window.onload = function() {
        const saved = localStorage.getItem('hitster_db_players');
        if (saved) {
            players = JSON.parse(saved);
            const lastSet = localStorage.getItem('hitster_last_set') || 'set1';
            loadSongsFromSheet(lastSet).then(() => showGame());
        }
    };

    async function loadSongsFromSheet(selectedKey) {
        const url = playlists[selectedKey];
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const geladeneSongs = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const columns = rows[i].includes(';') ? rows[i].split(';') : rows[i].split(',');
                const song = {
                    ytId: columns[0]?.trim() || "",
                    titel: columns[1]?.trim() || "",
                    interpret: columns[2]?.trim() || "",
                    jahr: columns[3]?.trim() || ""
                };
                if (song.ytId && song.ytId.length > 5) geladeneSongs.push(song);
            }
            songDatenbank = geladeneSongs;
            updateDbCounter();
            localStorage.setItem('hitster_last_set', selectedKey);
            return true;
        } catch (e) {
            alert("Fehler beim Laden!");
            return false;
        }
    }

    function updateDbCounter() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        const dbCountElem = document.getElementById('db-count');
        if(dbCountElem) dbCountElem.innerText = `Noch verfügbar: ${pool.length} (Gespielt: ${playedSongIds.length})`;
    }

    function createPlayerInputs(num) {
        const container = document.getElementById('name-inputs');
        container.innerHTML = "<h3>Namen:</h3>";
        for(let i=1; i<=num; i++) {
            container.innerHTML += `<input type="text" id="name-${i}" placeholder="Spieler ${i}">`;
        }
        document.getElementById('start-game-btn').classList.remove('hidden');
    }

    async function startGame() {
        const set = document.getElementById('playlist-dropdown').value;
        const ok = await loadSongsFromSheet(set);
        if(!ok) return;
        const inputs = document.querySelectorAll('#name-inputs input');
        const existingPlayers = JSON.parse(localStorage.getItem('hitster_db_players')) || [];
        players = Array.from(inputs).map(inp => {
            const name = inp.value || "Spieler";
            const oldData = existingPlayers.find(p => p.name === name);
            return { name: name, score: 0, timeline: [], wins: oldData ? oldData.wins : 0 };
        });
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        showGame();
    }

    function showGame() {
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderScoreboard();
    }

    function pickRandomSong() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        if (pool.length === 0) return alert("Paket leer!");
        currentSong = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('status').innerText = "Song bereit!";
        document.getElementById('display-title').innerText = currentSong.titel + " - " + currentSong.interpret;
        document.getElementById('display-year').innerText = "Jahr: " + currentSong.jahr;
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('song-info').classList.add('hidden');
        document.getElementById('video-player').src = "";
    }

    function startVideo() {
        if(currentSong) document.getElementById('video-player').src = "https://www.youtube.com/embed/" + currentSong.ytId + "?autoplay=1";
    }

    function stopVideo() {
        document.getElementById('video-player').src = "";
    }

    function revealInfo() {
        stopVideo();
        document.getElementById('song-info').classList.remove('hidden');
        if (currentSong && !playedSongIds.includes(currentSong.ytId)) {
            playedSongIds.push(currentSong.ytId);
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        }
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = "";
        players.forEach((p, i) => {
            const sorted = [...p.timeline].sort((a, b) => parseInt(a.jahr) - parseInt(b.jahr));
            const timelineHTML = sorted.map(s => `<div class="timeline-card"><span class="timeline-year">${s.jahr}</span> ${s.titel}</div>`).join("");
            sb.innerHTML += `
                <div class="player-score">
                    <span class="total-wins">🏆 Siege: ${p.wins || 0}</span>
                    <strong>${p.name}</strong>
                    <span class="score-val">${p.score}</span>
                    <button onclick="addPoint(${i})">➕ Punkt</button>
                    <button onclick="updateScore(${i}, -1)" style="background:#555; padding: 5px 10px;">-1</button>
                    <div class="timeline">${timelineHTML}</div>
                 </div>`;
        });
    }

    function addPoint(idx) {
        if (!currentSong) return;
        players[idx].timeline.push({ titel: currentSong.titel, jahr: currentSong.jahr });
        players[idx].score = players[idx].timeline.length;
        if (players[idx].score >= 10) {
            players[idx].wins = (players[idx].wins || 0) + 1;
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            renderScoreboard();
            document.querySelectorAll('.player-score strong')[idx].classList.add('winner-glow');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => {
                alert("🏆 " + players[idx].name + " hat GEWONNEN!");
                if(confirm("Neue Runde?")) resetScores();
            }, 1000);
        } else {
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            renderScoreboard();
        }
    }

    function updateScore(i, v) {
        if (v < 0 && players[i].timeline.length > 0) players[i].timeline.pop();
        players[i].score = players[i].timeline.length;
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        renderScoreboard();
    }

    function resetScores() {
        players.forEach(p => { p.score = 0; p.timeline = []; });
        localStorage.setItem('hitster_db_players', JSON.stringify(players));
        renderScoreboard();
    }

    function resetOnlyWins() {
        if(confirm("Siege zurücksetzen?")) {
            players.forEach(p => { p.wins = 0; });
            localStorage.setItem('hitster_db_players', JSON.stringify(players));
            renderScoreboard();
        }
    }
    
    function resetGame() {
        if(confirm("Alles löschen?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
